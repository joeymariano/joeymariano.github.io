<div class="w-full bg-black relative">
    <!-- S K E L E T O N -->
    <div id="bb-skeleton" class="rounded-xl absolute inset-0 z-10"></div>
    <!-- Old image (visible, underneath) -->
    <img id="black-book-page"
         src="{{ site.url }}/assets/img/black-book/13.jpg"
         class="rounded-xl w-full block">
    <!-- New image (hidden, slides in as wipe, absolutely positioned above) -->
    <img id="black-book-wipe"
         src="{{ site.url }}/assets/img/black-book/14.jpg"
         style="pointer-events:none; clip-path:inset(0 100% 0 0); transition:clip-path 0.4s cubic-bezier(.77,0,.175,1), opacity 0.2s linear; opacity:0;"
         class="rounded-xl w-full absolute inset-0 top-0 left-0 block">
</div>

<script type="module">
	const NUM_PAGES = 40;
	let pageNumber = 13;
	const blackBookPage = document.getElementById('black-book-page');
	const blackBookWipe = document.getElementById('black-book-wipe');
	const prevBtn = document.getElementById("prev-page");
	const nextBtn = document.getElementById("next-page");
	const skeleton = document.getElementById('bb-skeleton');
	const baseUrl = "{{ site.url }}/assets/img/black-book/";

	// Preload all images
	const imageCache = {};
	let loadedCount = 0;

	function setButtonsDisabled(disabled) {
		prevBtn.disabled = disabled;
		nextBtn.disabled = disabled;
		prevBtn.style.opacity = disabled ? "0.4" : "1";
		nextBtn.style.opacity = disabled ? "0.4" : "1";
	}

	setButtonsDisabled(true);

	for (let i = 0; i < NUM_PAGES; i++) {
		const img = new window.Image();
		img.src = `${baseUrl}${i}.jpg`;
		img.onload = img.onerror = () => {
			imageCache[i] = img;
			loadedCount++;
			if (loadedCount === NUM_PAGES) {
				setButtonsDisabled(false);
				skeleton.classList.add('loaded');
			}
		};
	}

	// Animation queue
	let animQueue = [];
	let isAnimating = false;
	let lastClickTime = 0;

	function runNext() {
		if (animQueue.length === 0) {
			isAnimating = false;
			return;
		}
		isAnimating = true;
		const {newPageNumber, direction} = animQueue.shift();

		const fromRight = direction === "next";
		const startClip = fromRight ? "inset(0 0% 0 100%)" : "inset(0 100% 0 0)";
		const newImgUrl = `${baseUrl}${newPageNumber}.jpg`;

		// Reset clip and hide BEFORE setting new src (prep for next wipe)
		blackBookWipe.style.transition = "none";
		blackBookWipe.style.opacity = "0";
		blackBookWipe.style.clipPath = startClip;
		blackBookWipe.src = newImgUrl;

		requestAnimationFrame(() => {
			requestAnimationFrame(() => {
				// Now reveal and animate
				blackBookWipe.style.opacity = "1";
				blackBookWipe.style.transition = "clip-path 0.4s cubic-bezier(.77,0,.175,1)";
				blackBookWipe.style.clipPath = "inset(0 0% 0 0%)";
			});
		});

		setTimeout(() => {
			// Wipe is fully covering — safe to swap underlying image
			blackBookPage.src = newImgUrl;
			pageNumber = newPageNumber;

			// Fade out wipe while underlying image is now correct
			blackBookWipe.style.transition = "opacity 0.01s";
			blackBookWipe.style.opacity = "0";

			runNext();
		}, 400);
	}

	function wipeToImage(newPageNumber, direction) {
		newPageNumber = Math.max(0, Math.min(NUM_PAGES - 1, newPageNumber));
		animQueue.push({newPageNumber, direction});
		if (!isAnimating) runNext();
	}

	prevBtn.addEventListener("click", () => {
		const now = Date.now();
		if (now - lastClickTime < 450) return;
		lastClickTime = now;
		const target = Math.max(0, (animQueue.length
			? animQueue[animQueue.length - 1].newPageNumber
			: pageNumber) - 1);
		wipeToImage(target, "prev");
	});

	nextBtn.addEventListener("click", () => {
		const now = Date.now();
		if (now - lastClickTime < 450) return;
		lastClickTime = now;
		const target = Math.min(NUM_PAGES - 1, (animQueue.length
			? animQueue[animQueue.length - 1].newPageNumber
			: pageNumber) + 1);
		wipeToImage(target, "next");
	});
</script>
