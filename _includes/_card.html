{% assign card = include.item %}
<div class="{% if card.size == '1x' %}col-span-1{% elsif card.size == '2x' %}md:col-span-2{% endif %} fade-in-item">
    <!-- S T R U C T U R E D  D A T A — for rich results / AI agents -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "{% if card.music %}MusicRecording{% elsif card.category contains 'art' %}VisualArtwork{% else %}CreativeWork{% endif %}",
      "name": {{ card.title | jsonify }},
      "image": {{ '/assets/img/' | append: card.image | absolute_url | jsonify }},
      "description": {{ card.alt | default: card.title | strip_newlines | jsonify }},
      {% if card.link %}"url": {{ card.link | jsonify }},
      {% endif %}{% if card.music %}"byArtist": { "@type": "MusicGroup", "name": "nmlstyl", "url": "https://nmlstyl.art" }{% else %}"creator": { "@type": "Person", "name": "Joey Mariano", "url": "{{ site.url }}" }{% endif %},
      "inLanguage": "en-US"
    }
    </script>
    <!-- container with drop shadow -->
    <div class="striped-div h-full rounded-3xl bg-black p-4 {% if card.music %}pb-10{% endif %} shadow-[8px_8px_0px_#181818] relative">
        <div>
            {% if card.video %}
            <video src="/assets/img/{{ card.video }}" poster="/assets/img/{{ card.image }}"
             autoplay loop muted playsinline preload="metadata"
             aria-label="{{ card.alt | default: card.title }}"
             class="aspect-[auto_4/3] {% if card.round_image == true %}rounded-full{% elsif card.round_image == false %}
             rounded-3xl{% endif %} ring-4 ring-black w-full"></video>
            {% else %}
            <img src="/assets/img/{{ card.image }}" alt="{{ card.alt | default: card.title }}"
             loading="lazy" decoding="async"
             class="aspect-[auto_4/3] {% if card.round_image == true %}rounded-full{% elsif card.round_image == false %}
             rounded-3xl{% endif %} ring-4 ring-black w-full cursor-zoom-in">
            {% endif %}
        </div>

        <!-- content is a squiggle line created by tricky CSS -->
        <div class="before-title pt-16 pb-4"></div>

        <h2 class="card-title pb-6">
            <span class="ring-[#222222] ring-2 p-2 uppercase p-2 rounded-xl">{{ card.title }}</span>
        </h2>

        <!-- script in footer adds tailwind classes to dynamically create markdown in the content -->
        <div class="card-contents text-sm text-justify text-gray-400 font-semibold pb-4 rounded-3xl">
            {{ card.content }}
        </div>

        {% if card.music %}
            {% include _media-controller.html music=card.music %}
        {% endif %}

        <!-- C O P Y  B U T T O N -->
        <button class="copy-card-btn absolute bottom-4 right-4 text-gray-600 hover:text-gray-400 transition duration-150" title="Copy card">
            <svg class="copy-icon w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            <svg class="check-icon w-4 h-4 hidden text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </button>
    </div>
</div>
