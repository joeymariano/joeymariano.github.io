<header class="bg-blue-500 py-4 px-6 dark:bg-blue-800">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <h1 class="text-3xl font-bold text-white">{{ site.title }}</h1>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex space-x-6">
      <ul class="flex space-x-6">
        <li><a href="/" class="text-white hover:text-gray-200">Home</a></li>
        <li><a href="/about/" class="text-white hover:text-gray-200">About</a></li>
        <li><a href="/contact/" class="text-white hover:text-gray-200">Contact</a></li>
      </ul>
    </nav>

    <!-- Mobile Navigation Toggle -->
    <div class="md:hidden">
      <button id="hamburger" class="text-white">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu (Hidden by default) -->
  <div id="mobile-menu" class="md:hidden hidden bg-blue-500 py-4">
    <ul class="space-y-4 px-6">
      <li><a href="/" class="text-white hover:text-gray-200">Home</a></li>
      <li><a href="/about/" class="text-white hover:text-gray-200">About</a></li>
      <li><a href="/contact/" class="text-white hover:text-gray-200">Contact</a></li>
    </ul>
  </div>
</header>
