<header id="header" class="pl-8 pr-8 pt-6 pb-8">
    <nav>
        <!-- container -->
        <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto">

            <!-- mobile row: hamburger left, title right — xl:contents makes wrapper transparent to flexbox on desktop -->
            <div class="flex flex-row items-center justify-between w-full xl:contents">

                <!-- L O G O  A N D  T I T L E -->
                <p class="md:text-xl rounded-xl item-center
                    duration-1000 ease-in-out ml-2 min-w-0">
                    <a href="/" class="flex rtl:space-x-reverse items-center">
                        <img src="/assets/img/joey-mariano-logo.svg" class="h-8" alt="nmlstyl logo"/>&nbsp;&nbsp;
                        &nbsp;
                        <span class="hdr-1-macro nav-link h-10 inline-flex items-center"
                              style="font-size: clamp(0.55rem, 3.5vw, 1.125rem); letter-spacing: clamp(0.02em, 0.4vw, 0.1em);">{{ site.title }}<span>
                    </a>
                </p>

                <!-- H A M B U R G E R -->
                <button id="menu-btn" data-collapse-toggle="navbar-default" type="button"
                class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm rounded-lg
                        xl:hidden"
                        aria-controls="navbar-default" aria-expanded="false">
                    <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
                         viewBox="0 0 17 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M1 1h15M1 7h15M1 13h15"/>
                    </svg>
                </button>

            </div>

            <!-- N A V -->
            <div id="menu" class="hidden w-full xl:block xl:w-auto">
                <ul class="gap-2 bg-black xl:bg-transparent font-medium flex flex-col p-4 xl:p-0 mt-4 rounded-xl
                    xl:flex-row xl:space-x-8 rtl:space-x-reverse xl:mt-0">
                    <li><a href="/resume"
                           class="block py-1 px-2 bg-black ring-2 ring-yellow-300 rounded-lg nav-link">Resume</a>
                    </li>
                    <li><a href="/code"
                           class="block py-1 px-2 bg-black ring-2 ring-blue-500 rounded-lg nav-link">Code / Tech</a>
                    </li>
                    <li><a href="/music"
                           class="block py-1 px-2 bg-black ring-2 ring-red-500 rounded-lg nav-link">Music</a>
                    </li>
                    <li><span><a href="/visual-art"
                           class="block py-1 px-2 bg-black ring-2 ring-red-500 rounded-lg nav-link">Visual Art</a></span>
                    </li>
                    <li><span><a href="#" id="contact-nav-link"
                                 class="block py-1 px-2 bg-black ring-2 ring-yellow-300 rounded-lg nav-link">Contact</a></span>
                    </li>
                </ul>
            </div>

        </div> <!-- end container -->
    </nav>
</header>
