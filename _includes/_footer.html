<!-- I M A G E  M O D A L -->
<div id="image-modal" class="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4"
     aria-hidden="true" role="dialog" aria-label="Expanded image">
  <div class="relative inline-block">
    <img id="image-modal-img" src="" alt="" class="block ring-4 ring-black rounded-3xl" />
    <img id="image-modal-wipe" src="" alt="" aria-hidden="true"
         class="absolute inset-0 rounded-3xl pointer-events-none"
         style="opacity:0;" />
    <div id="image-modal-controls"
         class="absolute top-4 right-4 z-10 flex items-center gap-4">
      <!-- in book mode, JS inserts next then prev before the close button (order left→right: next, prev, X) -->
      <button id="image-modal-close" type="button"
              class="w-10 h-10 flex items-center justify-center
                     bg-black rounded-full ring-2 ring-red-500"
              aria-label="Close image">
        <div class="hamburger-inner is-x"></div>
      </button>
    </div>
    <!-- I N F O  B U T T O N  +  T O G G L A B L E  P A N E L -->
    <button id="image-modal-info-btn" type="button"
            class="absolute bottom-4 left-4 z-10 w-10 h-10 flex items-center justify-center
                   bg-black rounded-full ring-2 ring-blue-500 text-blue-400 italic font-bold text-lg"
            aria-label="Toggle info" aria-expanded="false">i</button>
    <div id="image-modal-info-panel"
         class="absolute bottom-16 left-4 right-4 z-10 hidden
                bg-black/95 ring-2 ring-blue-500 rounded-2xl p-4
                max-h-[40vh] overflow-y-auto"
         aria-hidden="true">
      <h3 id="image-modal-info-title" class="text-white font-bold mb-2 text-lg"></h3>
      <div id="image-modal-info-content" class="text-gray-300 text-sm"></div>
    </div>
    <!-- M U S I C  P L A Y E R  (mirrors source card's audio; music continues when modal closes) -->
    <div id="image-modal-music"
         class="absolute bottom-4 left-16 right-4 z-10 hidden
                bg-black/95 ring-2 ring-blue-500 rounded-full
                flex items-center gap-3 px-4 py-2">
      <button id="image-modal-music-playpause" type="button"
              class="bg-transparent flex items-center justify-center text-white"
              aria-label="Play">
        <svg class="image-modal-play-icon w-6 h-6" aria-hidden="true"><use href="#play"/></svg>
        <svg class="image-modal-pause-icon w-6 h-6 hidden" aria-hidden="true"><use href="#pause"/></svg>
      </button>
      <input id="image-modal-music-seekbar" type="range" min="0" max="100" value="0"
             class="seekbar w-full" aria-label="Seek"/>
      <span id="image-modal-music-time" class="text-sm text-white whitespace-nowrap">0:00</span>
    </div>
  </div>
</div>

<!-- C O P Y  C A R D -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.copy-card-btn').forEach(function (btn) {
      btn.addEventListener('click', async function () {
        const card     = btn.closest('.striped-div');
        const img      = card.querySelector('img');
        const titleEl  = card.querySelector('.card-title');
        const contentEl = card.querySelector('.card-contents');

        const imgSrc    = img ? img.src : '';
        const imgHtml   = imgSrc ? '<img src="' + imgSrc + '" style="max-width:100%;"><br><br>' : '';
        const titleHtml = titleEl ? '<h2>' + titleEl.textContent.trim() + '</h2>' : '';
        const bodyHtml  = contentEl ? contentEl.innerHTML : '';
        const plainText = (titleEl ? titleEl.textContent.trim() + '\n\n' : '') +
                          (contentEl ? contentEl.textContent.trim() : '');

        try {
          await navigator.clipboard.write([
            new ClipboardItem({
              'text/html':  new Blob([imgHtml + titleHtml + bodyHtml], { type: 'text/html' }),
              'text/plain': new Blob([plainText], { type: 'text/plain' }),
            })
          ]);
          btn.querySelector('.copy-icon').classList.add('hidden');
          btn.querySelector('.check-icon').classList.remove('hidden');
          setTimeout(function () {
            btn.querySelector('.copy-icon').classList.remove('hidden');
            btn.querySelector('.check-icon').classList.add('hidden');
          }, 1500);
        } catch (e) {
          console.warn('Copy failed', e);
        }
      });
    });
  });
</script>

<!-- I M A G E  M O D A L  L O G I C -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const modal     = document.getElementById('image-modal');
    const modalImg  = document.getElementById('image-modal-img');
    const modalWipe = document.getElementById('image-modal-wipe');
    const controls  = document.getElementById('image-modal-controls');
    const closeBtn  = document.getElementById('image-modal-close');
    if (!modal || !modalImg || !closeBtn) return;

    const infoBtn     = document.getElementById('image-modal-info-btn');
    const infoPanel   = document.getElementById('image-modal-info-panel');
    const infoTitle   = document.getElementById('image-modal-info-title');
    const infoContent = document.getElementById('image-modal-info-content');

    function setInfo(title, html) {
      if (infoTitle)   infoTitle.textContent = title || '';
      if (infoContent) infoContent.innerHTML = html || '';
      if (!infoBtn || !infoPanel) return;
      if (!title && !html) {
        infoBtn.classList.add('hidden');
      } else {
        infoBtn.classList.remove('hidden');
      }
    }

    function toggleInfo() {
      if (!infoPanel || !infoBtn) return;
      const wasHidden = infoPanel.classList.contains('hidden');
      infoPanel.classList.toggle('hidden');
      infoPanel.setAttribute('aria-hidden', wasHidden ? 'false' : 'true');
      infoBtn.setAttribute('aria-expanded', wasHidden ? 'true' : 'false');
    }

    if (infoBtn) infoBtn.addEventListener('click', toggleInfo);

    // M U S I C  P L A Y E R  M I R R O R
    const musicBar       = document.getElementById('image-modal-music');
    const musicPlay      = document.getElementById('image-modal-music-playpause');
    const musicSeek      = document.getElementById('image-modal-music-seekbar');
    const musicTime      = document.getElementById('image-modal-music-time');
    const musicPlayIcon  = musicPlay ? musicPlay.querySelector('.image-modal-play-icon')  : null;
    const musicPauseIcon = musicPlay ? musicPlay.querySelector('.image-modal-pause-icon') : null;

    let boundAudio = null;
    let boundListeners = null;

    function unbindAudio() {
      if (boundAudio && boundListeners) {
        boundAudio.removeEventListener('play',       boundListeners.onPlay);
        boundAudio.removeEventListener('pause',      boundListeners.onPause);
        boundAudio.removeEventListener('timeupdate', boundListeners.onTime);
      }
      boundAudio = null;
      boundListeners = null;
      if (musicBar) musicBar.classList.add('hidden');
    }

    function bindAudio(audio) {
      unbindAudio();
      if (!audio || !musicBar || !musicPlay || !musicSeek || !musicTime) return;
      boundAudio = audio;

      function updateIcons() {
        if (audio.paused) {
          musicPlayIcon.classList.remove('hidden');
          musicPauseIcon.classList.add('hidden');
          musicPlay.setAttribute('aria-label', 'Play');
        } else {
          musicPlayIcon.classList.add('hidden');
          musicPauseIcon.classList.remove('hidden');
          musicPlay.setAttribute('aria-label', 'Pause');
        }
      }
      function updateTime() {
        musicSeek.value = (audio.currentTime / audio.duration) * 100 || 0;
        const m = Math.floor(audio.currentTime / 60);
        const s = Math.floor(audio.currentTime % 60).toString().padStart(2, '0');
        musicTime.textContent = m + ':' + s;
      }
      updateIcons();
      updateTime();
      audio.addEventListener('play',       updateIcons);
      audio.addEventListener('pause',      updateIcons);
      audio.addEventListener('timeupdate', updateTime);
      boundListeners = { onPlay: updateIcons, onPause: updateIcons, onTime: updateTime };
      musicBar.classList.remove('hidden');
    }

    if (musicPlay) musicPlay.addEventListener('click', function () {
      if (!boundAudio) return;
      if (boundAudio.paused) boundAudio.play();
      else                   boundAudio.pause();
    });
    if (musicSeek) musicSeek.addEventListener('input', function () {
      if (!boundAudio || !boundAudio.duration) return;
      boundAudio.currentTime = (musicSeek.value / 100) * boundAudio.duration;
    });

    let bookMode = false;
    let buttonsHome = null;

    function enterBookMode() {
      const prevBtn = document.getElementById('prev-page');
      const nextBtn = document.getElementById('next-page');
      if (!prevBtn || !nextBtn || !controls) return;
      bookMode = true;
      buttonsHome = prevBtn.parentElement;
      // Order: prev, next, X — insert each before the close button
      controls.insertBefore(prevBtn, closeBtn);
      controls.insertBefore(nextBtn, closeBtn);
    }

    function exitBookMode() {
      if (!bookMode) return;
      const prevBtn = document.getElementById('prev-page');
      const nextBtn = document.getElementById('next-page');
      if (buttonsHome && prevBtn && nextBtn) {
        buttonsHome.appendChild(prevBtn);
        buttonsHome.appendChild(nextBtn);
      }
      bookMode = false;
      buttonsHome = null;
    }

    function fitImage() {
      let nw = modalImg.naturalWidth;
      let nh = modalImg.naturalHeight;
      if (!nw || !nh) { nw = nh = 1; } // SVGs without intrinsic dims → square fallback
      const vw = window.innerWidth * 0.95;
      const vh = window.innerHeight * 0.95;
      const ratio = nw / nh;
      let w, h;
      if (vw / ratio <= vh) { w = vw; h = vw / ratio; }
      else                   { h = vh; w = vh * ratio; }
      modalImg.style.width  = w + 'px';
      modalImg.style.height = h + 'px';
    }

    function setRoundClass(el, roundClass) {
      Array.from(el.classList).forEach(function (c) {
        if (c.indexOf('rounded-') === 0) el.classList.remove(c);
      });
      el.classList.add(roundClass);
    }

    function getRoundClass(img) {
      for (var i = 0; i < img.classList.length; i++) {
        var c = img.classList[i];
        if (c.indexOf('rounded-') === 0) return c;
      }
      return 'rounded-3xl';
    }

    function openModal(src, alt, roundClass, isBookMode, info, audio) {
      setRoundClass(modalImg, roundClass);
      if (modalWipe) setRoundClass(modalWipe, roundClass);
      modalImg.src = src;
      modalImg.alt = alt || '';
      if (isBookMode) enterBookMode();
      // populate info panel and always start it collapsed
      setInfo(info && info.title, info && info.html);
      if (infoPanel) {
        infoPanel.classList.add('hidden');
        infoPanel.setAttribute('aria-hidden', 'true');
      }
      if (infoBtn) infoBtn.setAttribute('aria-expanded', 'false');
      // mirror the source card's audio element (or hide the bar if none)
      if (audio) bindAudio(audio);
      else       unbindAudio();
      modal.classList.add('is-open');
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      if (modalImg.complete && modalImg.naturalWidth) fitImage();
      else modalImg.addEventListener('load', fitImage, { once: true });
    }

    function closeModal() {
      exitBookMode();
      // detach modal listeners but DO NOT pause — music continues in the source card
      unbindAudio();
      modal.classList.remove('is-open');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      setTimeout(function () {
        if (!modal.classList.contains('is-open')) modalImg.src = '';
      }, 220);
    }

    document.querySelectorAll('.striped-div img, #black-book-page').forEach(function (img) {
      img.style.cursor = 'zoom-in';
      img.addEventListener('click', function () {
        const card = img.closest('.striped-div');
        let info = null;
        if (card) {
          const titleEl   = card.querySelector('.card-title');
          const contentEl = card.querySelector('.card-contents');
          info = {
            title: titleEl   ? titleEl.textContent.trim() : '',
            html:  contentEl ? contentEl.innerHTML : ''
          };
        }
        openModal(img.src, img.alt, getRoundClass(img), img.id === 'black-book-page', info);
      });
    });

    // Mirror the Black Book wipe inside the modal using the same shared routine
    document.addEventListener('blackbook:wipestart', function (e) {
      if (!bookMode || !modal.classList.contains('is-open')) return;
      if (typeof window.blackBookWipeImages === 'function' && modalWipe) {
        window.blackBookWipeImages(modalImg, modalWipe, e.detail);
      }
    });

    window.addEventListener('resize', function () {
      if (modal.classList.contains('is-open')) fitImage();
    });

    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', function (e) {
      if (e.target === modal) closeModal();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && modal.classList.contains('is-open')) closeModal();
    });
  });
</script>

<!-- script adds tailwind classes to dynamically create markdown in the content -->
<script>
  // Add Tailwind classes to elements inside the card content
  document.addEventListener("DOMContentLoaded", function () {
    // Find the parent of the content (the .text-sm div)
    const cardContents = document.querySelectorAll('.card-contents');
    cardContents.forEach(function (content) {
      // Blockquotes
      content.querySelectorAll('blockquote').forEach(function (el) {
        el.classList.add('border-l-4', 'border-gray-700', 'pl-4', 'italic', 'my-4', 'text-gray-300');
      });
      // Unordered Lists
      content.querySelectorAll('ul').forEach(function (el) {
        el.classList.add('list-disc', 'pl-6', 'my-2', 'space-y-1', 'text-gray-500', 'text-left');
      });
      // List Items
      content.querySelectorAll('li').forEach(function (el) {
        el.classList.add('mb-1', 'ml-2');
        el.setAttribute('style', 'list-style-type: \'⊕ \';');
      });
      // Links
      content.querySelectorAll('a').forEach(function (el) {
        el.classList.add('text-blue-400', 'hover:text-blue-200', 'transition',
                'duration-150');
        el.setAttribute('target', '_blank');
      });
      content.querySelectorAll('p').forEach(function (el) {
        el.classList.add('pb-4');
      });
    });
  });
</script>
