title: Joey Mariano
tagline: Creative Technologist, Artist, Educator
email: joey@joeymariano.com
description: >- # this means to ignore newlines until "baseurl:"
 Ms. Joey Mariano — creative technologist, artist, and educator with 26 years
 of practice integrating arts and technology across music, visual art, and code.
baseurl: "" # the subpath of your site, e.g. /blog
url: https://joeymariano.com
lang: en

author:
 name: Joey Mariano
 email: joey@joeymariano.com

github_username: joeymariano
bandcamp_username: nmlstyl

# Use cards and jobs instead of posts
collections:
 cards:
  output: false # Jobs won't be output as individual pages (optional)
 jobs:
  output: false # Jobs won't be output as individual pages (optional)

# Build settings
plugins:
 - jekyll-feed
 - jekyll-sitemap
 - jekyll-postcss

# Exclude from processing
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list."
exclude:
 - _originals/
 - assets/css/partials/
 - .sass-cache/
 - .jekyll-cache/
 - gemfiles/
 - Gemfile
 - Gemfile.lock
 - node_modules/
 - vendor/bundle/
 - vendor/cache/
 - vendor/gems/
 - vendor/ruby/

postcss:
 cache: false