<!DOCTYPE html>
<html lang="en" class="bg-black text-gray-900 dark:bg-gradient-to-br from-stone-900 via-stone-900 to-gray-600
 dark:text-white">

{% include head.html %}

<body class="">

{% include header.html %}

<div class="p-8"> <!-- container for cards -->
  <div class="grid lg:grid-cols-4 gap-4">
    {% for item in site.cards %}
    <!-- card size -->
    <div class="{% if item.size == '1x' %}col-span-1{% elsif item.size == '2x' %}col-span-2{% endif %}">
      <!-- container w/ drop shadow -->
      <div class="rounded-3xl bg-black p-4 drop-shadow-[10px_10px_4px_rgba(38,38,38)]">
        <p> <!-- round or square image -->
          <img src="{{ item.image }}" alt="title" class="{% if item.round_image == true %}rounded-full{% elsif item.round_image == false %}rounded-3xl{% endif %}">
        </p>

        <!-- text paragraph-->
        <p class="text-justify p-4 rounded-3xl bg-black">
          {{ item.content }}
        </p>
      </div> <!-- end card -->
    </div>
    {% endfor %}
  </div>
</div>

{% include footer.html %}

</body>

</html>
